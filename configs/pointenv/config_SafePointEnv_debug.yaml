agent:
    discount: 1
    ensemble_size: 3
    num_bins: 20
    actor_update_interval: 1
    targets_update_interval: 5
    tau: 0.05
    use_distributional_rl: true
    # cost configs
    cost_limit: 1.0
    cost_min: 0.0
    cost_max: 2.0
    cost_N: 20
    cost_critic_lr: 0.001
    lambda_lr: 0.001
    lambda_optimizer: "Adam"
ckpt_dir: ./workdirs/debug_CentralObstacle/
#ckpt_dir: ./workdirs/debug_FourRooms/
env:
    walls: CentralObstacle
    resize_factor: 5
    thin: false
    cost_limit: 1.0
wrappers:
    SafeGoalConditionedPointWrapper:
        prob_constraint: 0.8
        min_dist: 0 
        max_dist: 4
        min_cost: 0
        max_cost: 1000
        threshold_distance: 1.0
        # pre-compiled maze-specific estimations on cost and path lengths
        # to generate, run pud/algos/cbfs_eval.py or pud/algos/cbfs_mp.py
        #cbfs_policy_path: "pud/envs/precompiles/central_obstacle_v2.pkl"
time_limit:
    max_episode_steps: 20
cost_function:
    name: "cosine"
    radius: 2.0
replay_buffer:
    max_size: 1000
runner:
    batch_size_opt: 64
    collect_steps: 2
    eval_interval: 100
    initial_collect_steps: 10
    num_eval_episodes: 10
    num_iterations: 300000
    opt_steps: 1
    warmup_epochs: 10
    eval_distances: [2, 5, 10, 20]
    eval_cost_intervals: [0.0, 0.3943001329211866, 1.0]
    verbose: false
seed: 0
